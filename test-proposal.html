<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropFlow - AI Proposal Generator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body { 
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 40px 20px;
}

.container { 
  max-width: 900px; 
  margin: 0 auto;
  background: white;
  border-radius: 24px;
  padding: 48px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

/* USAGE BAR */
.usage-bar {
  background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
  border: 2px solid #0ea5e9;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.usage-info h3 {
  font-size: 14px;
  color: #0c4a6e;
  font-weight: 700;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.usage-count {
  font-size: 24px;
  font-weight: 800;
  color: #0369a1;
}

.usage-count.warning { color: #ea580c; }
.usage-count.limit { color: #dc2626; }

.upgrade-btn {
  background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
  color: white;
  border: none;
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
  transition: all 0.3s;
}

.upgrade-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(245, 158, 11, 0.6);
}

.pro-badge {
  background: linear-gradient(135deg, #10b981 0%, #059669 100%);
  color: white;
  padding: 8px 16px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.05em;
}

h1 { 
  color: #1a1a2e;
  margin-bottom: 12px;
  font-size: 36px;
  font-weight: 800;
  letter-spacing: -0.02em;
}

.subtitle {
  color: #6b7280;
  margin-bottom: 40px;
  font-size: 16px;
}

.field {
  margin-bottom: 24px;
}

label {
  display: block;
  font-weight: 600;
  margin-bottom: 8px;
  color: #374151;
  font-size: 14px;
}

input, textarea, select {
  width: 100%;
  padding: 14px 16px;
  border: 2px solid #e5e7eb;
  border-radius: 12px;
  font-size: 15px;
  font-family: inherit;
  transition: all 0.2s;
  background: #f9fafb;
}

input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: #667eea;
  background: white;
  box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

textarea {
  min-height: 120px;
  resize: vertical;
}

.btn {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border: none;
  padding: 16px 32px;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  width: 100%;
  margin-top: 16px;
  transition: all 0.3s;
  box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
}

.btn:disabled {
  background: #9ca3af;
  cursor: not-allowed;
  box-shadow: none;
}

/* RESULT SECTION */
.result {
  margin-top: 48px;
  padding: 32px;
  background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
  border-radius: 20px;
  border: 2px solid #0ea5e9;
  display: none;
  position: relative;
}

.result.show {
  display: block;
  animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.result h2 {
  color: #0c4a6e;
  margin-bottom: 24px;
  font-size: 24px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 12px;
}

.success-icon {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, #10b981 0%, #059669 100%);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 18px;
  animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.2s backwards;
}

@keyframes popIn {
  0% { transform: scale(0); opacity: 0; }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}

.proposal-text {
  background: white;
  padding: 32px;
  border-radius: 16px;
  white-space: pre-wrap;
  word-wrap: break-word;
  font-family: 'Georgia', serif;
  line-height: 1.8;
  color: #1e293b;
  font-size: 16px;
  position: relative;
  max-height: 600px;
  overflow-y: auto;
}

.copy-btn {
  position: absolute;
  top: 20px;
  right: 20px;
  background: linear-gradient(135deg, #10b981 0%, #059669 100%);
  color: white;
  border: none;
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
  transition: all 0.3s;
  display: flex;
  align-items: center;
  gap: 8px;
  animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.5s backwards;
}

.copy-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(16, 185, 129, 0.5);
}

.copy-btn.copied {
  background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
  animation: pulse 0.5s;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

/* FEEDBACK BUTTON */
.feedback-btn {
  background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
  color: white;
  border: none;
  padding: 14px 28px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 24px;
  width: 100%;
  box-shadow: 0 4px 12px rgba(245, 158, 11, 0.3);
  transition: all 0.3s;
}

.feedback-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(245, 158, 11, 0.4);
}

/* FEEDBACK MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(4px);
  z-index: 9999;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
  animation: fadeIn 0.2s;
}

.modal-overlay.active {
  display: flex;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.feedback-modal {
  background: white;
  border-radius: 24px;
  max-width: 500px;
  width: 100%;
  padding: 48px;
  position: relative;
  animation: scaleIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}

.modal-close {
  position: absolute;
  top: 20px;
  right: 20px;
  background: #f3f4f6;
  border: none;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 20px;
  color: #6b7280;
}

.modal-close:hover {
  background: #e5e7eb;
}

.feedback-modal h2 {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 16px;
  color: #1a1a2e;
}

.feedback-modal p {
  color: #6b7280;
  margin-bottom: 24px;
}

.star-rating {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  justify-content: center;
}

.star {
  font-size: 40px;
  cursor: pointer;
  color: #e5e7eb;
  transition: all 0.2s;
}

.star.active {
  color: #f59e0b;
}

.star:hover {
  transform: scale(1.2);
}

.toast {
  position: fixed;
  bottom: 30px;
  right: 30px;
  background: linear-gradient(135deg, #10b981 0%, #059669 100%);
  color: white;
  padding: 16px 24px;
  border-radius: 12px;
  box-shadow: 0 8px 24px rgba(16, 185, 129, 0.4);
  display: none;
  align-items: center;
  gap: 12px;
  font-weight: 600;
  z-index: 10000;
  animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

.toast.show { display: flex; }

@keyframes slideInRight {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.loading {
  text-align: center;
  padding: 40px;
  color: #6b7280;
}

.spinner {
  width: 48px;
  height: 48px;
  border: 4px solid #e5e7eb;
  border-top-color: #667eea;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div class="container">
  <!-- USAGE BAR -->
  <div class="usage-bar" id="usageBar">
    <div class="usage-info">
      <h3>Monthly Usage</h3>
      <div class="usage-count" id="usageCount">Loading...</div>
      <p style="font-size: 12px; color: #64748b; margin-top: 4px;">Free: 3 proposals/month • Pro: Unlimited</p>
    </div>
    <button class="upgrade-btn" id="upgradeBtn" onclick="window.location.href='/upgrade.html'" style="display:none;">
      ⚡ Upgrade to Pro
    </button>
    <div class="pro-badge" id="proBadge" style="display:none;">
      ✓ PRO MEMBER
    </div>
  </div>

  <h1>🤖 AI Proposal Generator</h1>
  <p class="subtitle">Fill in the details below to generate a professional, AI-powered proposal</p>
  
  <form id="proposalForm">
    <div class="field">
      <label>Your Name / Business *</label>
      <input type="text" id="name" placeholder="Muhammad Shahzad Mazhar" required>
    </div>

    <div class="field">
      <label>Profession *</label>
      <select id="profession" required>
        <option value="">Select your profession...</option>
        <option value="Freelance Web Developer">Freelance Web Developer</option>
        <option value="Freelance Designer">Freelance Designer</option>
        <option value="Freelance Copywriter">Freelance Copywriter</option>
        <option value="Marketing Consultant">Marketing Consultant</option>
        <option value="UX/UI Designer">UX/UI Designer</option>
      </select>
    </div>

    <div class="field">
      <label>Years of Experience *</label>
      <input type="number" id="yearsExperience" placeholder="5" min="0" required>
    </div>

    <div class="field">
      <label>Your Email *</label>
      <input type="email" id="email" placeholder="your@email.com" required>
    </div>
    
    <div class="field">
      <label>Client Name / Company *</label>
      <input type="text" id="clientName" placeholder="TechVision Solutions Inc." required>
    </div>
    
    <div class="field">
      <label>Project Description *</label>
      <textarea id="projectDescription" placeholder="Describe the project in detail..." required></textarea>
    </div>
    
    <div class="field">
      <label>Budget *</label>
      <input type="text" id="budget" placeholder="$12,500" required>
    </div>
    
    <div class="field">
      <label>Timeline *</label>
      <input type="text" id="timeline" placeholder="8 weeks" required>
    </div>
    
    <div class="field">
      <label>Key Deliverables (one per line) *</label>
      <textarea id="deliverables" placeholder="Custom website design&#10;Mobile responsive layout&#10;SEO optimization" required></textarea>
    </div>
    
    <button type="submit" class="btn" id="generateBtn">✨ Generate AI Proposal</button>
  </form>
  
  <div id="result" class="result">
    <h2>
      <span class="success-icon">✓</span>
      <span id="resultTitle">Your AI-Generated Proposal</span>
    </h2>
    <button class="copy-btn" id="copyBtn" onclick="copyProposal()">
      <span>📋</span>
      <span id="copyText">Copy to Clipboard</span>
    </button>
    <div class="proposal-text" id="proposalText"></div>
    
    <!-- FEEDBACK BUTTON (Shows after proposal generated) -->
    <button class="feedback-btn" id="feedbackBtn" onclick="showFeedbackModal()" style="display:none;">
      ⭐ Rate Your Experience
    </button>
  </div>
</div>

<!-- FEEDBACK MODAL -->
<div class="modal-overlay" id="feedbackModal">
  <div class="feedback-modal">
    <button class="modal-close" onclick="closeFeedbackModal()">×</button>
    <h2>⭐ Share Your Feedback</h2>
    <p>How was your experience with PropFlow?</p>
    
    <div class="star-rating" id="starRating">
      <span class="star" onclick="setRating(1)">★</span>
      <span class="star" onclick="setRating(2)">★</span>
      <span class="star" onclick="setRating(3)">★</span>
      <span class="star" onclick="setRating(4)">★</span>
      <span class="star" onclick="setRating(5)">★</span>
    </div>
    
    <div class="field">
      <label>Your Feedback *</label>
      <textarea id="feedbackText" placeholder="Tell us what you think..." rows="4" required></textarea>
    </div>
    
    <button class="btn" onclick="submitFeedback()">Submit Feedback</button>
  </div>
</div>

<div class="toast" id="toast">
  <span>✓</span>
  <span id="toastMessage">Success!</span>
</div>

<script>
const API_URL = 'https://my-clean-app-production.up.railway.app/api';
const token = localStorage.getItem('token');
let selectedRating = 0;

if (!token) {
  window.location.href = '/';
}

// Load usage
async function loadUsage() {
  try {
    const response = await fetch(`${API_URL}/payment/status`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    
    const data = await response.json();
    
    if (data.success) {
      const usageCount = document.getElementById('usageCount');
      const upgradeBtn = document.getElementById('upgradeBtn');
      const proBadge = document.getElementById('proBadge');
      
      if (data.plan === 'pro') {
        usageCount.textContent = 'Unlimited Proposals';
        usageCount.classList.remove('warning', 'limit');
        upgradeBtn.style.display = 'none';
        proBadge.style.display = 'block';
      } else {
        const generated = data.proposalsGenerated;
        const limit = data.limit;
        usageCount.textContent = `${generated}/${limit} Proposals Used`;
        
        if (generated >= limit) {
          usageCount.classList.add('limit');
        } else if (generated >= limit - 1) {
          usageCount.classList.add('warning');
        }
        
        upgradeBtn.style.display = 'block';
        proBadge.style.display = 'none';
      }
    }
  } catch (error) {
    console.error('Failed to load usage:', error);
  }
}

loadUsage();

document.getElementById('proposalForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const btn = document.getElementById('generateBtn');
  const result = document.getElementById('result');
  const proposalText = document.getElementById('proposalText');
  const feedbackBtn = document.getElementById('feedbackBtn');
  
  const data = {
    name: document.getElementById('name').value,
    profession: document.getElementById('profession').value,
    yearsExperience: document.getElementById('yearsExperience').value,
    email: document.getElementById('email').value,
    clientName: document.getElementById('clientName').value,
    projectDescription: document.getElementById('projectDescription').value,
    budget: document.getElementById('budget').value,
    timeline: document.getElementById('timeline').value,
    deliverables: document.getElementById('deliverables').value
  };
  
  btn.disabled = true;
  btn.textContent = '🔮 Generating...';
  result.className = 'result show';
  proposalText.innerHTML = '<div class="loading"><div class="spinner"></div><p>AI is crafting your proposal...</p></div>';
  feedbackBtn.style.display = 'none';
  
  try {
    const response = await fetch(`${API_URL}/generate/proposal`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify(data)
    });
    
    const responseData = await response.json();
    
    if (!response.ok) {
      if (responseData.upgrade) {
        window.location.href = '/upgrade.html';
      }
      throw new Error(responseData.message || 'Failed to generate');
    }
    
    proposalText.textContent = responseData.proposal;
    document.getElementById('copyBtn').style.display = 'flex';
    
    // SHOW FEEDBACK BUTTON AFTER SUCCESSFUL GENERATION
    feedbackBtn.style.display = 'block';
    
    loadUsage();
    
  } catch (error) {
    result.classList.add('error');
    proposalText.textContent = `Error: ${error.message}`;
  } finally {
    btn.disabled = false;
    btn.textContent = '✨ Generate AI Proposal';
  }
});

function copyProposal() {
  const text = document.getElementById('proposalText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('toast');
    const copyBtn = document.getElementById('copyBtn');
    const copyText = document.getElementById('copyText');
    
    copyBtn.classList.add('copied');
    copyText.textContent = 'Copied!';
    document.getElementById('toastMessage').textContent = 'Copied to clipboard!';
    toast.classList.add('show');
    
    setTimeout(() => {
      copyBtn.classList.remove('copied');
      copyText.textContent = 'Copy to Clipboard';
      toast.classList.remove('show');
    }, 2000);
  });
}

function showFeedbackModal() {
  document.getElementById('feedbackModal').classList.add('active');
}

function closeFeedbackModal() {
  document.getElementById('feedbackModal').classList.remove('active');
  selectedRating = 0;
  document.querySelectorAll('.star').forEach(star => star.classList.remove('active'));
  document.getElementById('feedbackText').value = '';
}

function setRating(rating) {
  selectedRating = rating;
  const stars = document.querySelectorAll('.star');
  stars.forEach((star, index) => {
    if (index < rating) {
      star.classList.add('active');
    } else {
      star.classList.remove('active');
    }
  });
}

async function submitFeedback() {
  const feedbackText = document.getElementById('feedbackText').value.trim();
  
  if (selectedRating === 0) {
    alert('Please select a star rating!');
    return;
  }
  
  if (!feedbackText) {
    alert('Please write your feedback!');
    return;
  }
  
  try {
    const response = await fetch(`${API_URL}/testimonials/submit`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({
        rating: selectedRating,
        feedback: feedbackText
      })
    });
    
    const data = await response.json();
    
    if (data.success) {
      closeFeedbackModal();
      document.getElementById('toastMessage').textContent = 'Thank you for your feedback!';
      document.getElementById('toast').classList.add('show');
      setTimeout(() => {
        document.getElementById('toast').classList.remove('show');
      }, 3000);
      
      // Hide feedback button after submission
      document.getElementById('feedbackBtn').style.display = 'none';
    } else {
      alert(data.message || 'Failed to submit feedback');
    }
  } catch (error) {
    console.error('Feedback error:', error);
    alert('Failed to submit feedback. Please try again.');
  }
}
</script>

</body>
</html>
