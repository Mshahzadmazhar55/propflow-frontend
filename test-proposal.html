<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PropFlow - AI Proposal Generator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body { 
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 40px 20px;
}

.container { 
  max-width: 900px; 
  margin: 0 auto;
  background: white;
  border-radius: 24px;
  padding: 48px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

h1 { 
  color: #1a1a2e;
  margin-bottom: 12px;
  font-size: 36px;
  font-weight: 800;
  letter-spacing: -0.02em;
}

.subtitle {
  color: #6b7280;
  margin-bottom: 40px;
  font-size: 16px;
}

.field {
  margin-bottom: 24px;
}

label {
  display: block;
  font-weight: 600;
  margin-bottom: 8px;
  color: #374151;
  font-size: 14px;
}

input, textarea, select {
  width: 100%;
  padding: 14px 16px;
  border: 2px solid #e5e7eb;
  border-radius: 12px;
  font-size: 15px;
  font-family: inherit;
  transition: all 0.2s;
  background: #f9fafb;
}

input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: #667eea;
  background: white;
  box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

textarea {
  min-height: 120px;
  resize: vertical;
}

.btn {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border: none;
  padding: 16px 32px;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  width: 100%;
  margin-top: 16px;
  transition: all 0.3s;
  box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
}

.btn:active {
  transform: translateY(0);
}

.btn:disabled {
  background: #9ca3af;
  cursor: not-allowed;
  box-shadow: none;
}

/* RESULT SECTION */
.result {
  margin-top: 48px;
  padding: 32px;
  background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
  border-radius: 20px;
  border: 2px solid #0ea5e9;
  display: none;
  position: relative;
  overflow: hidden;
}

.result.show {
  display: block;
  animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.result h2 {
  color: #0c4a6e;
  margin-bottom: 24px;
  font-size: 24px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 12px;
}

.success-icon {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, #10b981 0%, #059669 100%);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 18px;
  animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.2s backwards;
}

@keyframes popIn {
  0% {
    transform: scale(0);
    opacity: 0;
  }
  50% {
    transform: scale(1.2);
  }
  100% {
    transform: scale(1);
    opacity: 1;
  }
}

.proposal-text {
  background: white;
  padding: 32px;
  border-radius: 16px;
  border: 2px solid #bae6fd;
  white-space: pre-wrap;
  word-wrap: break-word;
  font-family: 'Georgia', serif;
  line-height: 1.8;
  color: #1e293b;
  font-size: 16px;
  position: relative;
  box-shadow: 0 4px 20px rgba(14, 165, 233, 0.1);
  max-height: 600px;
  overflow-y: auto;
}

/* ANIMATED TEXT REVEAL */
.proposal-text.animating {
  opacity: 0;
  animation: fadeIn 0.3s forwards;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

.proposal-text::selection {
  background: #fef3c7;
  color: #92400e;
}

/* COPY BUTTON */
.copy-btn {
  position: absolute;
  top: 20px;
  right: 20px;
  background: linear-gradient(135deg, #10b981 0%, #059669 100%);
  color: white;
  border: none;
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
  transition: all 0.3s;
  display: flex;
  align-items: center;
  gap: 8px;
  z-index: 10;
  animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.5s backwards;
}

.copy-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(16, 185, 129, 0.5);
}

.copy-btn:active {
  transform: scale(0.95);
}

.copy-btn.copied {
  background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
  animation: pulse 0.5s;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

.copy-icon {
  font-size: 18px;
}

/* SUCCESS TOAST */
.toast {
  position: fixed;
  bottom: 30px;
  right: 30px;
  background: linear-gradient(135deg, #10b981 0%, #059669 100%);
  color: white;
  padding: 16px 24px;
  border-radius: 12px;
  box-shadow: 0 8px 24px rgba(16, 185, 129, 0.4);
  display: none;
  align-items: center;
  gap: 12px;
  font-weight: 600;
  z-index: 1000;
  animation: slideInRight 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

.toast.show {
  display: flex;
}

@keyframes slideInRight {
  from {
    transform: translateX(100%);
    opacity: 0;
  }
  to {
    transform: translateX(0);
    opacity: 1;
  }
}

.toast-icon {
  font-size: 24px;
}

.error {
  background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
  border-color: #ef4444;
}

.error h2 {
  color: #991b1b;
}

.loading {
  text-align: center;
  padding: 40px;
  color: #6b7280;
}

.spinner {
  width: 48px;
  height: 48px;
  border: 4px solid #e5e7eb;
  border-top-color: #667eea;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* SCROLL STYLING */
.proposal-text::-webkit-scrollbar {
  width: 8px;
}

.proposal-text::-webkit-scrollbar-track {
  background: #f1f5f9;
  border-radius: 10px;
}

.proposal-text::-webkit-scrollbar-thumb {
  background: #cbd5e1;
  border-radius: 10px;
}

.proposal-text::-webkit-scrollbar-thumb:hover {
  background: #94a3b8;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .container {
    padding: 32px 24px;
  }
  
  h1 {
    font-size: 28px;
  }
  
  .copy-btn {
    position: static;
    margin-bottom: 16px;
    width: 100%;
    justify-content: center;
  }
  
  .toast {
    bottom: 20px;
    right: 20px;
    left: 20px;
  }
}
</style>
</head>
<body>

<div class="container">
  <h1>🤖 AI Proposal Generator</h1>
  <p class="subtitle">Fill in the details below to generate a professional, AI-powered proposal in seconds</p>
  
  <form id="proposalForm">
    <div class="field">
      <label>Your Name / Business *</label>
      <input type="text" id="name" placeholder="Muhammad Shahzad Mazhar" required>
    </div>

    <div class="field">
      <label>Profession *</label>
      <select id="profession" required>
        <option value="">Select your profession...</option>
        <option value="Freelance Web Developer">Freelance Web Developer</option>
        <option value="Freelance Designer">Freelance Designer</option>
        <option value="Freelance Copywriter">Freelance Copywriter</option>
        <option value="Freelance Photographer">Freelance Photographer</option>
        <option value="Freelance Video Editor">Freelance Video Editor</option>
        <option value="Social Media Manager">Social Media Manager</option>
        <option value="Marketing Consultant">Marketing Consultant</option>
        <option value="UX/UI Designer">UX/UI Designer</option>
        <option value="SEO Specialist">SEO Specialist</option>
      </select>
    </div>

    <div class="field">
      <label>Years of Experience *</label>
      <input type="number" id="yearsExperience" placeholder="5" min="0" required>
    </div>

    <div class="field">
      <label>Your Email *</label>
      <input type="email" id="email" placeholder="your@email.com" required>
    </div>
    
    <div class="field">
      <label>Client Name / Company *</label>
      <input type="text" id="clientName" placeholder="TechVision Solutions Inc." required>
    </div>
    
    <div class="field">
      <label>Project Description *</label>
      <textarea id="projectDescription" placeholder="Describe the project in detail..." required></textarea>
    </div>
    
    <div class="field">
      <label>Budget *</label>
      <input type="text" id="budget" placeholder="$12,500" required>
    </div>
    
    <div class="field">
      <label>Timeline *</label>
      <input type="text" id="timeline" placeholder="8 weeks" required>
    </div>
    
    <div class="field">
      <label>Key Deliverables (one per line) *</label>
      <textarea id="deliverables" placeholder="Custom website design&#10;Mobile responsive layout&#10;SEO optimization&#10;30 days support" required></textarea>
    </div>
    
    <button type="submit" class="btn" id="generateBtn">✨ Generate AI Proposal</button>
  </form>
  
  <div id="result" class="result">
    <h2>
      <span class="success-icon">✓</span>
      <span id="resultTitle">Your AI-Generated Proposal</span>
    </h2>
    <button class="copy-btn" id="copyBtn" onclick="copyProposal()">
      <span class="copy-icon">📋</span>
      <span id="copyText">Copy to Clipboard</span>
    </button>
    <div class="proposal-text" id="proposalText"></div>
  </div>
</div>

<div class="toast" id="toast">
  <span class="toast-icon">✓</span>
  <span>Copied to clipboard!</span>
</div>

<script>
const API_URL = 'https://my-clean-app-production.up.railway.app/api';

document.getElementById('proposalForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const btn = document.getElementById('generateBtn');
  const result = document.getElementById('result');
  const proposalText = document.getElementById('proposalText');
  const resultTitle = document.getElementById('resultTitle');
  const copyBtn = document.getElementById('copyBtn');
  
  // Get form data
  const data = {
    name: document.getElementById('name').value,
    profession: document.getElementById('profession').value,
    yearsExperience: document.getElementById('yearsExperience').value,
    email: document.getElementById('email').value,
    clientName: document.getElementById('clientName').value,
    projectDescription: document.getElementById('projectDescription').value,
    budget: document.getElementById('budget').value,
    timeline: document.getElementById('timeline').value,
    deliverables: document.getElementById('deliverables').value
  };
  
  // Show loading
  btn.disabled = true;
  btn.textContent = '🔮 Generating your proposal...';
  result.className = 'result show';
  result.classList.remove('error');
  copyBtn.style.display = 'none';
  resultTitle.textContent = 'AI is crafting your proposal...';
  proposalText.innerHTML = '<div class="loading"><div class="spinner"></div><p>Claude AI is analyzing your project and writing a compelling proposal...</p></div>';
  
  // Scroll to result
  result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  
  try {
    const response = await fetch(`${API_URL}/generate/proposal`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(data)
    });
    
    const responseData = await response.json();
    
    if (!response.ok) {
      throw new Error(responseData.message || 'Failed to generate proposal');
    }
    
    // Show result with animation
    const proposal = responseData.proposal || responseData.content || 'Proposal generated!';
    
    resultTitle.textContent = 'Your AI-Generated Proposal';
    copyBtn.style.display = 'flex';
    
    // Animated text reveal
    proposalText.classList.add('animating');
    proposalText.textContent = proposal;
    
    // Scroll to result
    setTimeout(() => {
      result.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
    
  } catch (error) {
    console.error('Error:', error);
    result.classList.add('error');
    resultTitle.textContent = '⚠️ Generation Failed';
    copyBtn.style.display = 'none';
    proposalText.textContent = `Error: ${error.message}\n\nPlease check:\n• Backend server is running\n• API key is configured\n• Network connection is stable\n\nTry again in a moment.`;
  } finally {
    btn.disabled = false;
    btn.textContent = '✨ Generate AI Proposal';
  }
});

function copyProposal() {
  const proposalText = document.getElementById('proposalText').textContent;
  const copyBtn = document.getElementById('copyBtn');
  const copyText = document.getElementById('copyText');
  const toast = document.getElementById('toast');
  
  // Copy to clipboard
  navigator.clipboard.writeText(proposalText).then(() => {
    // Update button
    copyBtn.classList.add('copied');
    copyText.textContent = 'Copied!';
    
    // Show toast
    toast.classList.add('show');
    
    // Reset after 2 seconds
    setTimeout(() => {
      copyBtn.classList.remove('copied');
      copyText.textContent = 'Copy to Clipboard';
      toast.classList.remove('show');
    }, 2000);
  }).catch(err => {
    console.error('Copy failed:', err);
    alert('Failed to copy. Please select and copy manually.');
  });
}

// Auto-focus first field
document.getElementById('name').focus();
</script>

</body>
</html>
